name: Release APK

# Compila, firma y publica el APK en un GitHub Release cada vez que se
# empuja un tag vX.Y.Z. Obtainium detecta el release y descarga el APK.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Stage APK
        run: cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/PandaControl-${{ github.ref_name }}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PandaControl-${{ github.ref_name }}
          path: PandaControl-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: PandaControl-${{ github.ref_name }}.apk
          generate_release_notes: true
