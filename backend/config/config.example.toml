# apppanda-backend — config.
#
# El backend HTTP de la app Android Panda. Independiente del bot de Telegram.
# Lee métricas del sistema, expone HTTP REST en /api/v1/* y push SSE en
# /api/v1/events. Sin Telegram, sin polkit (Fase 1: read-only).

# ─── HTTP server ─────────────────────────────────────────────────────────
#
# Auth: Bearer token en Authorization header. /api/v1/health y /version
# son públicos. Sin tokens configurados, los endpoints autenticados
# devuelven 401.
#
# Bind: default 127.0.0.1. Para acceso desde el celular, levantar Tailscale
# en la torre y poner aquí la IP de la interfaz tailscale0 (100.x.y.z).
# NUNCA bindear a 0.0.0.0 — incluso siendo Fase 1 read-only, esto expone
# métricas del sistema, lista de procesos, journal, etc.
#
# Generar un token: python -c "import secrets; print(secrets.token_hex(32))"
[http]
enabled = true
host = "127.0.0.1"
port = 8890
tokens = []
# host = "100.64.0.5"   # IP Tailscale de la torre
# tokens = ["<hex de 64 chars>"]

# ─── Auth alternativa: identidad Tailscale ───────────────────────────────
#
# Si enabled = true y la request viene desde una IP del rango Tailscale
# (100.64.0.0/10 o fd7a:115c:a1e0::/48), el server llama
# `tailscale whois --json <peer_ip>` y autoriza si el UserProfile.LoginName
# está en allowed_logins. Esto permite que la app Android no necesite
# token — solo estar en tu tailnet con tu cuenta.
#
# Si la IP no es Tailscale, o whois falla, o el login no está en la lista,
# se cae al esquema de Bearer token de arriba.
#
# Para ver tu LoginName actual:
#   tailscale whois --json <tu_ip_tailscale> | jq .UserProfile.LoginName
#
[auth.tailscale]
enabled = false
allowed_logins = []
whois_cache_s = 60
# enabled = true
# allowed_logins = ["PandaAkiraNakai@github"]

# ─── Monitor ─────────────────────────────────────────────────────────────
#
# interval_s     — cada cuánto el monitor toma snapshot completo + escribe SQLite
# tick_publish_s — cada cuánto se publica un metric_tick liviano por SSE
#                  para feed en vivo de la app (no escribe SQLite)
[monitor]
enabled = true
interval_s = 60
tick_publish_s = 5

# ─── Histórico (SQLite WAL) ──────────────────────────────────────────────
[history]
db_path = "/var/lib/apppanda-backend/metrics.db"
retain_days = 14

# ─── Auditoría (JSONL append-only) ───────────────────────────────────────
[audit]
log_path = "/var/log/apppanda-backend/audit.log"

# ─── Red ─────────────────────────────────────────────────────────────────
[network]
ping_hosts = ["1.1.1.1", "8.8.8.8"]

# ─── Servicios para mostrar en /api/v1/services ──────────────────────────
#
# Solo unidades systemd: el backend consulta su estado con `systemctl show`.
# Para vigilar un stack Docker (p. ej. un compose), envuélvelo en una unit
# systemd oneshot y lista esa unit aquí. Ejemplo (monochrome.service):
#
#   [Service]
#   Type=oneshot
#   RemainAfterExit=yes
#   User=<tu_usuario>
#   WorkingDirectory=/ruta/al/compose
#   ExecStart=/usr/bin/docker compose up -d
#   ExecStop=/usr/bin/docker compose down
[services]
watch = [
    "sshd",
    "NetworkManager",
    "systemd-resolved",
    "apppanda-backend",
    "bot-comandos-torre",
    "docker",
    "monochrome",   # UI web de TIDAL — wrapper systemd del docker compose
]
# manageable = lista blanca de units que la app puede start/stop/restart.
manageable = [
    "monochrome",
]

# ─── Updates ─────────────────────────────────────────────────────────────
[updates]
command = ["checkupdates"]

# ─── SMART (opcional) ────────────────────────────────────────────────────
[smart]
devices = []
# devices = ["/dev/nvme0n1"]

[sudo]
enabled = false

# ─── Apps GUI (para Fase 3 — todavía no se lanzan vía HTTP) ──────────────
# Listadas en /api/v1/apps. El lanzamiento llega en Fase 3 con confirm.

# [apps.firefox]
# cmd = ["firefox"]
# label = "🦊 Firefox"

# ─── MPRIS / playerctl ───────────────────────────────────────────────────
[mpris]
ignore_players = []

# ─── VPS bridge (SSH) ────────────────────────────────────────────────────
[vps.hosts]
# [vps.hosts.vpspriv]
# ssh_alias = "vpspriv"

# ─── Steam ───────────────────────────────────────────────────────────────
[steam]
use_gamescope = true
exclude_appids = [
    "228980",
    "1070560",
    "1391110",
    "1493710",
    "1628350",
    "4183110",
]

# ─── Files (módulo Archivos) ─────────────────────────────────────────────
#
# Permite a la app listar/descargar archivos de los shared_dirs y subir
# archivos al primer shared_dir. Validaciones: filenames se restringen a un
# set seguro (alfa-numérico + algunos símbolos comunes), no se sirven dot-
# files, y los downloads chequean que el realpath siga colgando del
# shared_dir (defensa contra symlinks rebeldes).
#
# Solo configurar shared_dirs que querás que sean accesibles desde el
# celular. ~ se expande al home del usuario que corre el daemon.
[files]
enabled = true
shared_dirs = ["~/Descargas"]
max_upload_mb = 500

# ─── Temas (módulo Temas) ────────────────────────────────────────────────
#
# Carpeta con los temas visuales de la app. Cada archivo *.json define una
# paleta; la app los lista en /api/v1/themes y los aplica al vuelo. Para
# agregar un tema basta con dejar un *.json en esta carpeta — no hace falta
# reiniciar el daemon ni recompilar la app.
#
# Un tema es un PAQUETE COMPLETO: cambia colores, fuente, estilo de iconos y
# formas/bordes. Los colores son obligatorios (hex #RRGGBB o #AARRGGBB; un
# tema al que le falte alguno se ignora). El resto es opcional y cae al
# default si falta o es inválido.
#
#   {
#     "name": "Mi tema",
#     "dark": true,
#     "font": "mono",          // default | sans | serif | mono
#     "iconStyle": "outlined", // outlined | filled | rounded | sharp
#     "corner": 12,            // radio de esquinas en dp (0–48)
#     "border": 1,             // grosor de borde en dp (0 = sin borde, 0–8)
#     "backgroundImage": "cyberpunk.jpg", // (opcional) imagen de fondo:
#                              // nombre de un archivo de imagen que dejes en
#                              // ESTA misma carpeta. La app la baja vía
#                              // /api/v1/themes/image y la pinta detrás del
#                              // contenido con un velo. Si el archivo no
#                              // existe, se ignora (queda el color de fondo).
#     "colors": {
#       "background":     "#0D0D11",
#       "surface":        "#15151C",
#       "surfaceHigh":    "#1E1E26",
#       "onSurface":      "#E0E0E6",
#       "onSurfaceMuted": "#8A8A99",
#       "yellow":         "#FFEA00",
#       "magenta":        "#FF007A",
#       "cyan":           "#00E5FF",
#       "green":          "#00FF7F",
#       "red":            "#FF3860",
#       "orange":         "#FFA500"
#     }
#   }
#
# Nota sobre "font": "default" conserva el look mixto (titulares monospace +
# cuerpo sans del tema incluido); sans/serif/mono aplican esa familia a todo.
# ~ se expande al home del usuario que corre el daemon.
[themes]
dir = "~/.config/apppanda-backend/temas"

# ─── Escenas (presets de monitores + audio) ──────────────────────────────
#
# Cada [scenes.<name>] es un preset que la app aplica de un toque. Compone
# acciones ya existentes: apaga/enciende outputs de niri, fija el monitor
# enfocado y opcionalmente cambia el sink de audio por defecto. Los nombres
# de output salen de `niri msg outputs` (p. ej. DP-1, HDMI-A-1).
#
# [scenes.trabajo]
# label = "Trabajo"
# outputs_on = ["DP-1", "DP-2"]
# outputs_off = ["HDMI-A-1"]
# focus = "DP-2"
# sink = "alsa_output...analog-stereo"   # opcional
#
# [scenes.cine]
# label = "Cine (TV)"
# outputs_on = ["HDMI-A-1"]
# outputs_off = ["DP-1", "DP-2"]
# focus = "HDMI-A-1"

# ─── Mini terminal (opt-in) ───────────────────────────────────────────────
#
# Ejecuta `bash -lc <cmd>` como el usuario del daemon (SIN sudo). Está
# DESHABILITADA por defecto: es ejecución de comandos arbitrarios desde el
# celular, así que solo actívala si confías en tu token + tu tailnet.
[terminal]
enabled = false
timeout_s = 20
max_output_kb = 64
